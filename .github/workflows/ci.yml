name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create dummy frontend/dist for go:embed
        run: mkdir -p frontend/dist && echo "<!doctype html><html></html>" > frontend/dist/index.html
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      # golangci-lint v2 requires golangci-lint-action v7+. Pinned to a full
      # commit SHA (not a mutable tag) for supply-chain integrity; see
      # .golangci.yml for the linter config.
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

  vuln-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create dummy frontend/dist for go:embed
        run: mkdir -p frontend/dist && echo "<!doctype html><html></html>" > frontend/dist/index.html
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - name: Scan for known Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      # Fail on high/critical advisories; dev-only moderate ones don't block.
      - run: npm audit --audit-level=high
        working-directory: frontend

  test-go:
    needs: lint-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create dummy frontend/dist for go:embed
        run: mkdir -p frontend/dist && echo "<!doctype html><html></html>" > frontend/dist/index.html
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - run: go test $(go list ./internal/...) -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/...
      - name: Check Go coverage >= 80%
        run: |
          COV=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COV}%"
          if (( $(echo "$COV < 80" | bc -l) )); then
            echo "Coverage ${COV}% is below 80% threshold"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: coverage.out

  test-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
        working-directory: frontend
      - run: npm run test:coverage
        working-directory: frontend
      - name: Check frontend coverage >= 80%
        run: |
          COV=$(node -e "const r=require('./frontend/coverage/coverage-summary.json');console.log(r.total.lines.pct)")
          echo "Total line coverage: ${COV}%"
          if (( $(echo "$COV < 80" | bc -l) )); then
            echo "Coverage ${COV}% is below 80% threshold"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage

  build:
    needs: [test-go, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build frontend
        run: |
          cd frontend && npm install && npm run build && cd ..
      - name: Build native binary
        run: wails build -clean -tags webkit2_41
      - name: Verify binary exists
        run: |
          ls -la build/bin/silly-sleeve* || ls -la build/bin/
