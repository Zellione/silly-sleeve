# SonarCloud Automatic Analysis configuration.
# Automatic Analysis reads THIS file (.sonarcloud.properties), not
# sonar-project.properties (which is only used by a CI-based sonar-scanner).
# Keep the two in sync.

# Exclude vendored / generated / build output from analysis. The generated
# Wails bindings (frontend/wailsjs) repeat an identical convertValues() method
# in every model class, which otherwise inflates the duplicated-lines metric.
sonar.exclusions=design_handoff/**,frontend/node_modules/**,frontend/dist/**,frontend/wailsjs/**,build/**

# Test sources.
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*_test.go

# Belt-and-braces: keep generated bindings and tests out of duplicate detection.
sonar.cpd.exclusions=**/*.test.tsx,**/*.test.ts,**/*_test.go,frontend/wailsjs/**

# Coverage reports (used only by CI-based scans; harmless for Automatic Analysis).
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
