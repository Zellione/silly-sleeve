# SonarQube/SonarCloud analysis config.
# Note: sonar.projectKey and sonar.organization are account-specific and must
# be supplied via the scanner invocation or the SonarCloud project settings.
# A scan step is not yet wired into CI.

sonar.sources=.
sonar.exclusions=design_handoff/**,frontend/node_modules/**,frontend/dist/**,frontend/wailsjs/**,build/**

# Test sources.
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*_test.go
# Generated Wails bindings repeat an identical convertValues() per class; keep
# them out of duplication detection (they are already in sonar.exclusions, but
# Automatic Analysis still counts them toward new-code duplication).
sonar.cpd.exclusions=**/*.test.tsx,**/*.test.ts,**/*_test.go,frontend/wailsjs/**

# Coverage reports (paths match the artifacts produced by the CI test jobs).
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
